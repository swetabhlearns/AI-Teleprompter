name = "ai-tracker-worker"
main = "src/index.js"
compatibility_date = "2026-04-21"

[triggers]
crons = ["17 2 * * *"]

[observability]
enabled = true

[vars]
APP_NAME = "AI Tracker"
GEMINI_LIVE_MODEL = "gemini-3.1-flash-live-preview"
ALLOWED_ORIGINS = "https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173"

[[ratelimits]]
name = "AI_RATE_LIMITER"
namespace_id = "9182401"

[ratelimits.simple]
limit = 30
period = 60

[[ratelimits]]
name = "MEDIA_RATE_LIMITER"
namespace_id = "9182402"

[ratelimits.simple]
limit = 60
period = 60

[[ratelimits]]
name = "LIVE_RATE_LIMITER"
namespace_id = "9182403"

[ratelimits.simple]
limit = 6
period = 60

[[ratelimits]]
name = "FEEDBACK_RATE_LIMITER"
namespace_id = "9182404"

[ratelimits.simple]
limit = 20
period = 60

[[ratelimits]]
name = "TELEMETRY_RATE_LIMITER"
namespace_id = "9182405"

[ratelimits.simple]
limit = 120
period = 60

[[d1_databases]]
binding = "DB"
database_name = "ai-tracker-db"
database_id = "fe1ca327-04ba-4810-9851-d4ce00ed9465"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "INTERVIEW_LIVE_SESSION"
class_name = "InterviewLiveSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InterviewLiveSessionDO"]
